spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travelcompanion}
    username: ${SPRING_DATASOURCE_USERNAME:travelcompanion}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  cache:
    type: redis

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-string-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

logging:
  level:
    org.springframework.security: INFO
