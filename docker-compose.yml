services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travelcompanion}
      POSTGRES_USER: ${POSTGRES_USER:-travelcompanion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-travelcompanion}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  backend-java:
    build: ./backend-java
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-travelcompanion}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-travelcompanion}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SPRING_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string-in-production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      AI_SERVICE_URL: http://ai-service:8000

  ai-service:
    build: ./ai-service
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_MODEL_PROVIDER: ${AI_MODEL_PROVIDER:-openai}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
      NEXT_PUBLIC_AI_BASE_URL: /ai
    depends_on:
      - backend-java
      - ai-service

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8090:80"
    depends_on:
      - frontend
      - backend-java
      - ai-service

volumes:
  pgdata:
